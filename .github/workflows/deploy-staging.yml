name: Deploy Live Website Automatically

on:
  push:
    branches:
      - main  # ⚡ Triggers automatically EVERY time you push or merge to main

jobs:
  deploy-production:
    name: Deploy Live Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Strips out unnecessary local/git folders before uploading
      - name: Prepare deploy folder
        run: |
          mkdir -p .deploy
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.DS_Store' \
            --exclude='node_modules' \
            ./ .deploy/

      - name: Install FTP deploy tool
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy to cPanel Live Site via FTP
        env:
          FTP_SERVER: ${{ secrets.CPANEL_FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.CPANEL_FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.CPANEL_FTP_PASSWORD }}
        run: |
          lftp -c "
          set ftp:ssl-allow true
          set ssl:verify-certificate no
          open -u \"$FTP_USERNAME\",\"$FTP_PASSWORD\" \"$FTP_SERVER\"
          mirror -R --verbose --parallel=2 .deploy /celsiortech.com/
          bye
          "
